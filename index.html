<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Wave Survival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000; /* Black background as requested */
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            font-family: sans-serif;
            user-select: none;
        }
        #pause-btn {
            pointer-events: auto;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="hud">
        Health: <span id="hud-health"></span><br>
        Lives: <span id="hud-lives"></span><br>
        XP: <span id="hud-xp"></span><br>
        Gems: <span id="hud-gems"></span><br>
        <button id="pause-btn" style="pointer-events: auto;">Pause</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="enemy.js"></script>
    <script src="projectile.js"></script>
    <script type="module" src="gem.js"></script>
    <script src="player.js"></script>
    <script src="obstacle.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
